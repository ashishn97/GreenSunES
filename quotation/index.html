<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSE Quotation Generator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400..900&family=Nunito+Sans:wght@300..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" style="display:none;">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loading-msg">Generating document…</p>
      <p class="loading-sub">This may take 10–20 seconds</p>
    </div>
  </div>

  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      GSE Solar
    </div>
    <div class="status-indicator">
      <div id="status-dot" class="dot idle"></div>
      <span id="status-text">Ready</span>
    </div>
  </header>

  <main>

    <!-- Tab Type Switcher -->
    <div class="tab-switcher">
      <label class="tab-option">
        <input type="radio" name="type" value="bank" checked>
        <span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Bank Quotation
        </span>
      </label>
      <label class="tab-option">
        <input type="radio" name="type" value="client">
        <span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Client Quotation
        </span>
      </label>
    </div>

    <!-- Document Details -->
    <div class="card doc-details">
      <h2>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Document Details
      </h2>
      <div class="form-group row">
        <div>
          <label for="ref_no">Reference Number</label>
          <input type="text" id="ref_no" readonly>
        </div>
        <div>
          <label for="date">Quotation Date</label>
          <div class="input-icon-wrap">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="date" id="date">
          </div>
        </div>
      </div>
      <div class="form-group row">
        <div>
          <label for="kw">Capacity (kW)</label>
          <div class="input-icon-wrap input-suffix">
            <input type="number" id="kw" placeholder="e.g. 5">
            <span class="suffix-label">kW</span>
          </div>
        </div>
        <div>
          <label for="client_name">Client Name</label>
          <input type="text" id="client_name" placeholder="Full name">
        </div>
      </div>
      <div class="form-group">
        <label for="client_number">Client Mobile</label>
        <div class="input-icon-wrap">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          <input type="text" id="client_number" placeholder="10-digit phone number" maxlength="10" inputmode="numeric" pattern="[0-9]{10}">
        </div>
      </div>
      <div class="form-group">
        <label for="client_address">Installation Address</label>
        <div class="input-icon-wrap textarea-wrap">
          <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <textarea id="client_address" rows="3" placeholder="Full address"></textarea>
        </div>
      </div>
    </div>

    <!-- Pricing -->
    <div class="card pricing-details">
      <h2>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Pricing &amp; Calculations
      </h2>
      <input type="hidden" id="central_subsidy" value="78000">
      <input type="hidden" id="state_subsidy" value="18000">
      <input type="hidden" id="total_subsidy">
      <div class="form-group row">
        <div>
          <label for="base_cost">Base Cost (₹)</label>
          <div class="input-icon-wrap">
            <span class="prefix-label">₹</span>
            <input type="number" id="base_cost" placeholder="0">
          </div>
        </div>
        <div class="combined-input">
          <label>GST</label>
          <div class="inner-row">
            <div class="input-icon-wrap input-suffix" style="flex:0 0 110px">
              <input type="number" id="gst_pct" value="8.9" step="0.1">
              <span class="suffix-label">%</span>
            </div>
            <div class="input-icon-wrap" style="flex:1">
              <span class="prefix-label">₹</span>
              <input type="text" id="gst_display" readonly>
            </div>
          </div>
        </div>
      </div>

      <!-- Subsidy collapsible info -->
      <div class="subsidy-toggle" id="subsidy-toggle">
        <button type="button" class="subsidy-btn" onclick="document.getElementById('subsidy-toggle').classList.toggle('open')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Subsidy Details (Displayed for Info)
          <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="subsidy-body">
          <p class="subsidy-note">Estimated Subsidy: ₹96,000 (Central ₹78,000 + State ₹18,000)</p>
        </div>
      </div>

      <div class="form-group row" id="discount-container" style="display: none;">
        <div>
          <label for="discount_amount">Discount (₹)</label>
          <div class="input-icon-wrap">
            <span class="prefix-label">₹</span>
            <input type="number" id="discount_amount" placeholder="0">
          </div>
        </div>
      </div>

      <div class="final-box">
        <label>Final Payable Amount</label>
        <input type="text" id="final_amount" readonly>
        <input type="text" id="final_amount_words" readonly>
      </div>
    </div>

    <!-- Vendor Details -->
    <div class="card vendor-details">
      <h2>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Vendor Details
      </h2>
      <div class="form-group row">
        <div>
          <label for="vendor_select">Select Vendor</label>
          <select id="vendor_select">
            <option value="">-- Select Vendor --</option>
            <option value="Suraj Singh Rajawat|+91 8769151510">Suraj Singh Rajawat</option>
            <option value="Vikram Singh Rathore|+91 9829092143">Vikram Singh Rathore</option>
            <option value="Jagdish Kumar Sharma|+91 8000291519">Jagdish Kumar Sharma</option>
            <option value="Prakash Kumar Yadav|+91 7733869864">Prakash Kumar Yadav</option>
            <option value="Mukesh Kumar Yadav|+91 9406525761">Mukesh Kumar Yadav</option>
          </select>
        </div>
        <div>
          <label for="vendor_phone">Vendor Phone</label>
          <div class="input-icon-wrap">
            <span class="prefix-text">+91</span>
            <input type="text" id="vendor_phone" placeholder="Auto-filled on selection" maxlength="10" readonly>
          </div>
        </div>
      </div>
    </div>

    <!-- Material Components - cards rendered by JS -->
    <div class="card materials-details">
      <h2>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Material Components
        <span class="component-count">11 Components Total</span>
      </h2>
      <div id="materials-body" class="materials-cards"></div>
    </div>

    <!-- Actions -->
    <div class="actions-bar">
      <button id="clear-btn" class="btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear
      </button>
      <div class="primary-actions">
        <button id="btn-doc" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          DOCX
        </button>
        <button id="btn-pdf" class="btn-primary btn-pdf">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF
        </button>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
